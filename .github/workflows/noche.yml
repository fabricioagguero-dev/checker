          apodos = ['cool', 'pro', 'lucky', 'best', 'the', 'real', 'og', 'master', 'king', 'queen', 'wild', 'fast', 'slow', 'big', 'little', 'old', 'new', 'dark', 'light', 'fire', 'ice', 'star', 'sun', 'moon', 'sky', 'blue', 'red', 'gold', 'silver', 'iron', 'steel', 'power', 'super', 'mega', 'ultra', 'hyper', 'sonic', 'shadow', 'ghost', 'spirit', 'wolf', 'tiger', 'lion', 'eagle', 'hawk', 'bear', 'fox', 'snake', 'dragon', 'beast', 'gamer', 'player', 'boss', 'chief', 'captain', 'pilot', 'driver', 'scout', 'hunter', 'warrior', 'ninja', 'samurai', 'viking', 'knight', 'mage', 'wizard', 'cleric', 'rogue', 'monk', 'bard', 'hero', 'villain', 'ace', 'joker', 'champ', 'winner', 'loyal', 'brave', 'smart', 'wise', 'crazy', 'mad', 'happy', 'sad', 'angry', 'chill', 'easy', 'hard', 'tough', 'strong'] * 6
          
