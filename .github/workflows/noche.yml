          simbolos = ['!', '!!', '$', '$$', '@', '#', '!@#$']
          
          def gen_linea():
              # Usamos combinaciones de nombre+apellido o apodo+nombre
              if random.random() > 0.5:
                  user = random.choice(nombres) + random.choice(apellidos)[:3] + str(random.randint(10, 999))
              else:
                  user = random.choice(apodos) + random.choice(nombres) + str(random.randint(20, 90))
              
              email = f'{user.lower()}@comcast.net'
              passwords = []
              for _ in range(10):
                  p_tipo = random.randint(1, 4)
                  if p_tipo == 1: p = random.choice(temas) + str(random.randint(2010, 2026)) + random.choice(simbolos)
                  elif p_tipo == 2: p = user.capitalize() + random.choice(simbolos)
                  elif p_tipo == 3: p = random.choice(temas) + str(random.randint(10, 99)) + random.choice(simbolos)
                  else: p = str(random.randint(1, 9)) + random.choice(temas).lower() + str(random.randint(100, 999)) + '!'
                  passwords.append(p)
              return f'{email}:' + ' | '.join(passwords)

          lote_n = 1
          while True:
              file_txt = f'combos_{lote_n}.txt'
              file_zip = f'combos_n_{lote_n}.zip'
              
              with open(file_txt, 'w') as f:
                  for _ in range(1000000):
                      f.write(gen_linea() + '\n')
              
              with zipfile.ZipFile(file_zip, 'w', zipfile.ZIP_DEFLATED) as zipf:
                  zipf.write(file_txt)
              
              url = f'https://api.telegram.org/bot{TOKEN_TG}/sendDocument'
              try:
                  with open(file_zip, 'rb') as f_zip:
                      requests.post(url, data={'chat_id': CHAT_ID, 'caption': f'✅ Lote N: {lote_n} | 1M de combos'}, files={'document': f_zip})
              except: pass
              
              os.remove(file_txt)
              os.remove(file_zip)
              lote_n += 1
              time.sleep(5)
          "
          
          print('Iniciando proceso...')
          with open('combos_comcast_elite.txt', 'w') as f:
              for _ in range(MAX_LINEAS):
                  f.write(gen_linea() + '\n')
                  total += 1
                  if total % 1000000 == 0:
                      if time.time() - last_report > 60:
                          try:
                              requests.get(f'https://api.telegram.org/bot{TOKEN_TG}/sendMessage?chat_id={CHAT_ID}&text=📊 NexoraSaaS: {total // 1000000}M de 10M generados...')
                              last_report = time.time()
                          except: pass
          "

      - name: Empaquetar Resultado
        run: zip -1 combos_elite.zip combos_comcast_elite.txt

      - name: Subir a GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Combos-Comcast-Elite
          path: combos_elite.zip
          retention-days: 1 # Se borra en 24hs para no ocupar espacio eterno

      - name: Notificar Finalización
        run: |
          curl "https://api.telegram.org/bot8575399229:AAHBcjak2HSG3uoA1_yA64zJ3P0b0C9p0p4/sendMessage?chat_id=7210756206&text=🚀 ¡Terminado! No se puede enviar por acá por el peso, bajalo desde la pestaña ACTIONS de GitHub."

          MAX_LINEAS = 5000000 
          total = 0
          last_report = time.time()
          
          with open('combos_realistas.txt', 'w') as f:
              for _ in range(MAX_LINEAS):
                  f.write(gen_linea() + '\n')
                  total += 1
                  if total % 1000000 == 0:
                      try:
                          msg = f'📊 NexoraSaaS Real-Comcast: {total // 1000000}M de 5M'
                          requests.get(f'https://api.telegram.org/bot{TOKEN_TG}/sendMessage?chat_id={CHAT_ID}&text={msg}')
                      except: pass
          "
      - name: Comprimir y Enviar
        run: |
          zip -1 combos_ultra.zip combos_realistas.txt
          curl -F document=@"combos_ultra.zip" "https://api.telegram.org/bot8575399229:AAHBcjak2HSG3uoA1_yA64zJ3P0b0C9p0p4/sendDocument?chat_id=7210756206"
              for _ in range(MAX_LINEAS):
                  f.write(gen_linea() + '\n')
                  total += 1
                  if total % 1000000 == 0:
                      if time.time() - last_report > 60:
                          try:
                              msg = f'📊 NexoraSaaS Comcast: {total // 1000000}M de 30M'
                              requests.get(f'https://api.telegram.org/bot{TOKEN_TG}/sendMessage?chat_id={CHAT_ID}&text={msg}')
                              last_report = time.time()
                          except: pass
          "
      - name: Comprimir y Enviar
        run: |
          zip -9 combos_comcast.zip combos_comcast.txt
          curl -F document=@"combos_comcast.zip" "https://api.telegram.org/bot8575399229:AAHBcjak2HSG3uoA1_yA64zJ3P0b0C9p0p4/sendDocument?chat_id=7210756206"
