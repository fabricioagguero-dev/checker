name: Generador Noche Pro
on:
  workflow_dispatch:
  repository_dispatch:
    types: [start_mining]

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Generando Combos Comcast
        run: |
          python3 -c "
          import random, time, requests
          TOKEN_TG = '8575399229:AAHBcjak2HSG3uoA1_yA64zJ3P0b0C9p0p4'
          CHAT_ID = '7210756206'
          
          nombres = ['john', 'mike', 'david', 'chris', 'steve', 'kevin', 'mark', 'jeff', 'paul', 'brian', 'amy', 'nicole', 'sarah']
          apellidos = ['smith', 'johnson', 'williams', 'brown', 'jones', 'miller', 'davis', 'wilson', 'moore', 'taylor']
          
          def gen_linea():
              user = random.choice(nombres) + random.choice(apellidos)[:3] + str(random.randint(10, 999))
              passwords = [
                  user + '!', user + '2024', user + '2025', 
                  random.choice(nombres).capitalize() + '123!', 
                  'Welcome123', 'Comcast2024!', user.capitalize(), 
                  user + '01', 'Password123!', user[::-1]
              ]
              return f'{user}@comcast.net | ' + ' | '.join(passwords)

          # ESTE ES EL FRENO DE MANO (30 Millones)
          MAX_LINEAS = 30000000
          total = 0
          last_report = time.time()
          
          with open('combos_comcast.txt', 'w') as f:
              for _ in range(MAX_LINEAS):
                  f.write(gen_linea() + '\n')
                  total += 1
                  if total % 1000000 == 0:
                      if time.time() - last_report > 60:
                          try:
                              msg = f'📊 NexoraSaaS Comcast: {total // 1000000}M de 30M'
                              requests.get(f'https://api.telegram.org/bot{TOKEN_TG}/sendMessage?chat_id={CHAT_ID}&text={msg}')
                              last_report = time.time()
                          except: pass
          "
      - name: Comprimir y Enviar
        run: |
          zip -9 combos_comcast.zip combos_comcast.txt
          curl -F document=@"combos_comcast.zip" "https://api.telegram.org/bot8575399229:AAHBcjak2HSG3uoA1_yA64zJ3P0b0C9p0p4/sendDocument?chat_id=7210756206"
