name: Generador Noche Pro
on:
  workflow_dispatch:
  repository_dispatch:
    types: [start_mining]

jobs:
  generar:
    runs-on: ubuntu-latest
    steps:
      - name: Generacion con Reporte
        run: |
          python3 -c "
          import random, time, requests
          TOKEN_TG = '8575399229:AAHBcjak2HSG3uoA1_yA64zJ3P0b0C9p0p4'
          CHAT_ID = '7210756206'
          nombres = ['juan', 'jose', 'luis', 'carlos', 'mario', 'diego', 'fabian', 'matias', 'nicolas', 'lucas', 'maria', 'ana', 'laura', 'claudia', 'silvia']
          apellidos = ['gonzalez', 'rodriguez', 'lopez', 'garcia', 'martinez', 'perez', 'sanchez', 'romero', 'diaz', 'fernandez']
          anios = ['2020', '2021', '2022', '2023', '2024', '2025', '2026']
          def generar():
              return random.choice(nombres) + random.choice(apellidos)[:3] + random.choice(anios)
          end_time = time.time() + (6 * 3600)
          last_report = time.time()
          total = 0
          with open('combos_noche.txt', 'w') as f:
              while time.time() < end_time:
                  f.write(generar() + '\n')
                  total += 1
                  if time.time() - last_report > 60: # REPORTE CADA 1 MINUTO PARA PROBAR
                      try:
                          requests.get(f'https://api.telegram.org/bot{TOKEN_TG}/sendMessage?chat_id={CHAT_ID}&text=📊 NexoraSaaS: Generadas {total}')
                      except: pass
                      last_report = time.time()
          "
              while time.time() < end_time:
                  f.write(generar() + '\n')
                  total += 1
                  # Reporte cada 5 minutos
                  if time.time() - last_report > 300:
                      msg = f'📊 Reporte: Llevo {total} contraseñas generadas.'
                      requests.get(f'https://api.telegram.org/bot{TOKEN_TG}/sendMessage?chat_id={CHAT_ID}&text={msg}')
                      last_report = time.time()
          "
      - name: Enviar Final
        run: |
          zip -9 combos.zip combos_noche.txt
          curl -F document=@"combos.zip" https://api.telegram.org/bot8575399229:AAHBcjak2HSG3uoA1_yA64zJ3P0b0C9p0p4/sendDocument?chat_id=7210756206
          
