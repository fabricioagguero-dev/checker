def generar_humana():
    # Estructura variable para que el archivo sea diverso
    tipo = random.randint(1, 4)
    if tipo == 1: # Nombre + Año
        res = random.choice(nombres) + random.choice(anios)
    elif tipo == 2: # Apellido + Numero
        res = random.choice(apellidos) + str(random.randint(1, 999))
    elif tipo == 3: # Apodo + Simbolo + Año
        res = random.choice(apodos) + random.choice(simbolos) + random.choice(anios)
    else: # Nombre + Apellido (Cortado)
        res = random.choice(nombres) + random.choice(apellidos)[:4]
    
    # Ajuste de longitud (5 a 15)
    if len(res) < 5: res += str(random.randint(10, 99))
    if len(res) > 15: res = res[:15]
    
    # Capitalización aleatoria
    return res.capitalize() if random.random() > 0.5 else res

import time
end_time = time.time() + (8 * 3600)
with open('combos_noche.txt', 'w') as f:
    while time.time() < end_time:
        f.write(generar_humana() + '\n')
